<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にしむら整骨院</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  line-height: 1.6;
}

/* ヘッダー */
header {
  background: #000;
  color: #fff;
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
  font-size: 18px;
}

.insta-header {
  width: 28px;
}

/* ナビ */
nav {
  margin-top: 5px;
  width: 100%;
}

nav a {
  color: #fff;
  margin-right: 10px;
  text-decoration: none;
  font-size: 14px;
}

/* トップ */
.hero {
  background: url('img1.jpg') center/cover;
  color: #fff;
  text-align: center;
  padding: 60px 15px;
}

.hero h1 {
  font-size: 22px;
}

/* セクション */
.section {
  padding: 30px 15px;
  text-align: center;
}

.section h2 {
  font-size: 20px;
}

/* メニュー */
.flex {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

/* ボタン */
.menu-btn {
  width: 90%;
  max-width: 320px;
  padding: 20px;
  border-radius: 12px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  display: block;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.2s;
  position: relative;
}

.menu-btn:hover {
  transform: scale(1.05);
}

.menu-btn:active {
  transform: scale(0.97);
}

.label {
  position: absolute;
  top: -10px;
  left: -10px;
  background: #fff;
  color: #000;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 5px;
  font-weight: bold;
}

.hoken { background: #007bff; }
.jihi { background: #ff6600; }
.jiko { background: #e60023; }

.menu-btn p {
  margin: 5px 0 0;
  font-weight: normal;
  font-size: 14px;
}

.note {
  font-size: 12px;
  color: #666;
  margin-top: 20px;
}

img {
  width: 100%;
  max-width: 350px;
  border-radius: 10px;
  margin-top: 10px;
}

.cta {
  background: #ff6600;
  color: #fff;
  padding: 12px 20px;
  display: inline-block;
  margin-top: 15px;
  text-decoration: none;
  border-radius: 5px;
}

/* 地図 */
.map iframe {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 10px;
}

/* Q&A */
.faq {
  max-width: 600px;
  margin: 0 auto;
}

.faq-item {
  background: #f5f5f5;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
  padding: 15px;
  text-align: left;
}

.faq-question {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.faq-answer {
  display: none;
  margin-top: 10px;
}

/* フッター */
footer {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 20px;
}

/* 固定ボタン共通 */
.fixed-btn {
  position: fixed;
  bottom: 20px;
  padding: 15px 18px;
  border-radius: 50px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: bounce 1.5s infinite;
}

.fixed-btn img {
  width: 20px;
}

/* LINE */
.line-fixed {
  right: 15px;
  background: #06C755;
}

/* Instagram */
.insta-fixed {
  left: 15px;
  background: linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
}

/* アニメーション */
@keyframes bounce {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

/* PC */
@media(min-width:768px){
  .flex {
    flex-direction: row;
    justify-content: center;
  }
}
</style>
</head>

<body>

<header>
  <h1>🏥にしむら整骨院🏥</h1>
  <a href="https://www.instagram.com/gym_seikotuin">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="insta-header">
  </a>
</header>

<nav style="background:#000; padding:5px 15px;">
  <a href="#about">👨‍⚕️院長紹介</a>
  <a href="#menu">❤️‍🩹施術</a>
  <a href="#access">🚕アクセス</a>
  <a href="#faq">🙋Q&A</a>
</nav>


<section id="about" class="section">
  <h2>【院長の紹介】</h2>
  <img src="intyo.jpg">
  <img src="5.jpg">
  <p>一人ひとりに合わせた施術で根本改善を目指します。</p>
</section>

<section id="menu" class="section">
  <h2>【施術メニュー】</h2>
  <h2>☝️タップで料金が見れます</h2>

  <div class="flex">
    <a href="https://yuzu2021.github.io/hokensejyutu-ryoukin/" class="menu-btn hoken">
      <div class="label">✨よく選ばれています✨</div>
      <h3>保険施術</h3>
      <p>各種保険対応</p>
    </a>

    <a href="https://yuzu2021.github.io/hokengaisejyutu-page/" class="menu-btn jihi">
      <h3>自費施術</h3>
      <p>慢性痛の改善</p>
    </a>

    <a href="https://yuzu2021.github.io/lp-seikotsu-jiko2/" class="menu-btn jiko">
      <h3>交通事故治療</h3>
      <p>※自己負担0円となる場合があります</p>
    </a>
  </div>
</section>

<section id="access" class="section">
  <h2>アクセス</h2>
  <p>熊本市南区御幸笛田4-4-75</p>

  <a href="https://maps.app.goo.gl/C2bwAdXybJHKL8Ef6">
    <div class="map">
      <iframe src="https://www.google.com/maps?q=熊本市南区御幸笛田4-4-75&output=embed"></iframe>
    </div>
  </a>
</section>

<section id="faq" class="section">
  <h2>よくある質問</h2>

  <div class="faq">
    <div class="faq-item" onclick="toggle(this)">
      <div class="faq-question">施術は痛くない？ <span>＋</span></div>
      <div class="faq-answer">無理な施術は行いませんのでご安心ください。</div>
    </div>
  </div>
</section>

<footer>
  <p>© にしむら整骨院</p>
</footer>

<!-- 固定Instagram -->
<a href="https://www.instagram.com/gym_seikotuin" class="fixed-btn insta-fixed">
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  Instagram
</a>

<!-- 固定LINE -->
<a href="https://lin.ee/xUmAtVC" class="fixed-btn line-fixed">
  LINE予約
</a>

<script>
function toggle(el){
  const answer = el.querySelector(".faq-answer");
  answer.style.display = answer.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
