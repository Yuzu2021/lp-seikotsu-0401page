<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にしむら整骨院</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  line-height: 1.6;
}

/* ヘッダー */
header {
  background: #000;
  color: #fff;
  padding: 10px 15px;
}

header h2 {
  margin: 0;
  font-size: 18px;
}

nav {
  margin-top: 5px;
}

nav a {
  color: #fff;
  margin-right: 10px;
  text-decoration: none;
  font-size: 14px;
}

/* トップ */
.hero {
  background: url('img1.jpg') center/cover;
  color: #fff;
  text-align: center;
  padding: 60px 15px;
}

.hero h1 {
  font-size: 22px;
}

.hero p {
  font-size: 14px;
}

/* セクション */
.section {
  padding: 30px 15px;
  text-align: center;
}

.section h2 {
  font-size: 20px;
}

/* ボックス */
.flex {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.box {
  width: 90%;
  max-width: 320px;
  margin: 10px 0;
  padding: 15px;
  background: #f5f5f5;
  border-radius: 10px;
}

/* 画像 */
img {
  width: 100%;
  max-width: 350px;
  border-radius: 10px;
  margin-top: 10px;
}

/* ボタン */
.cta {
  background: #ff6600;
  color: #fff;
  padding: 12px 20px;
  display: inline-block;
  margin-top: 15px;
  text-decoration: none;
  border-radius: 5px;
  font-size: 14px;
}

/* フッター */
footer {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 15px;
  font-size: 12px;
}

/* 固定LINEボタン */
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 15px 18px;
  border-radius: 50px;
  font-size: 14px;
  text-decoration: none;
}

/* PC対応 */
@media(min-width:768px){
  .flex {
    flex-direction: row;
    justify-content: center;
  }

  .box {
    margin: 10px;
  }

  .hero {
    padding: 100px 20px;
  }

  .hero h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<header>
  <h2>にしむら整骨院</h2>
  <nav>
    <a href="#about">当院</a>

    <a href="#access">アクセス</a>
  </nav>

<!-- トップ -->
<section class="hero">
  <h1>その痛み、我慢しないでください</h1>
  <p>根本改善を目指す整骨院</p>
  <a href="https://lin.ee/xUmAtVC" class="cta">LINE予約する</a>
</section>

<section id="about" class="section">

    にしむら整骨院では、一人ひとりの症状に合わせた施術で

  <p>超音波：700円</p>
</section>

<!-- アクセス -->
<section id="access" class="section">

  <p>熊本市南区御幸笛田4-4-75</p>
  <p>マックスバリュから徒歩1分</p>

<!-- CTA -->
<section class="section" style="background:#ff6600; color:#fff;">
  <h2>ご予約はこちら</h2>
  <a href="https://lin.ee/xUmAtVC" class="cta">LINE予約する</a>

<footer>
  <p>© にしむら整骨院</p>
</footer>

<!-- 固定LINE -->
<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>
