<style>
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body {
  font-family: sans-serif;
  background: linear-gradient(to bottom, #111, #ffcc00);
  color: #fff;
}

/* 画像・動画のレスポンシブ対応 */
img, video {
  width: 100%;
  height: auto;
  display: block;
}

/* セクション */
section {
  padding: 60px 20px;
  text-align: center;
}

/* CTA */
.cta {
  background: linear-gradient(45deg, #ffcc00, #ff6600);
  color: #000;
}

/* カード */
.card {
  background: rgba(0,0,0,0.7);
  margin: 10px auto;
  padding: 20px;
  max-width: 300px;
  border-radius: 10px;
}

/* LINEボタン（左） */
.line-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #00c300;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 100;
  animation: bounce 1.5s infinite;
}

/* 電話ボタン（右） */
.tel-fixed {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff3b3b;
  color: #fff;
  padding: 15px 20px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 100;
  animation: bounce 1.5s infinite;
}

/* 画像内電話タップ */
.tel-wrap {
  position: relative;
}

.tel-btn {
  position: absolute;
  top: 72%;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 60px;
}

/* アニメーション */
@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* 見出し */
.gold {
  color: #ffcc00;
  font-weight: bold;
}

/* 🔥 500円強調 */
.price {
  font-size: 38px;
  color: #ff3b3b;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255,0,0,0.6);
}
