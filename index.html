<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にしむら整骨院</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  line-height: 1.6;
}

/* ヘッダー */
header {
  background: #000;
  color: #fff;
  padding: 10px 15px;
}

header h2 {
  margin: 0;
  font-size: 18px;
}

/* トップ */
.hero {
  background: url('img1.jpg') center/cover;
  color: #fff;
  text-align: center;
  padding: 60px 15px;
}

.hero h1 {
  font-size: 22px;
}

/* セクション */
.section {
  padding: 30px 15px;
  text-align: center;
}

.section h2 {
  font-size: 20px;
}

/* メニュー */
.flex {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

/* ボタン共通 */
.menu-btn {
  width: 90%;
  max-width: 320px;
  padding: 20px;
  border-radius: 12px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  display: block;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.2s;
  position: relative;
}

.menu-btn:hover {
  transform: scale(1.05);
}

.menu-btn:active {
  transform: scale(0.97);
}

/* ラベル */
.label {
  position: absolute;
  top: -10px;
  left: -10px;
  background: #fff;
  color: #000;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 5px;
  font-weight: bold;
}

/* 個別カラー */
.hoken {
  background: #007bff;
}

.jihi {
  background: #ff6600;
}

.jiko {
  background: #e60023;
}

.menu-btn p {
  margin: 5px 0 0;
  font-weight: normal;
  font-size: 14px;
}

/* 注意書き */
.note {
  font-size: 12px;
  color: #666;
  margin-top: 15px;
}

/* CTA */
.cta {
  background: #ff6600;
  color: #fff;
  padding: 12px 20px;
  display: inline-block;
  margin-top: 15px;
  text-decoration: none;
  border-radius: 5px;
}

/* フッター */
footer {
  background: #000;
  color: #fff;
  text-align: center;
  padding: 15px;
}

/* 固定LINE */
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 15px 18px;
  border-radius: 50px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h2>にしむら整骨院</h2>
</header>

<!-- トップ -->
<section class="hero">
  <h1>お身体の不調でお悩みの方へ</h1>
  <a href="https://lin.ee/xUmAtVC" class="cta">LINEで相談・予約</a>
</section>

<!-- メニュー -->
<section class="section">
  <h2>施術メニュー</h2>

  <div class="flex">

    <a href="https://yuzu2021.github.io/hokensejyutu-ryoukin/" class="menu-btn hoken">
      <div class="label">よく選ばれています</div>
      <h3>保険施術</h3>
      <p>各種保険に対応しています</p>
    </a>

    <a href="https://yuzu2021.github.io/hokengaisejyutu-page/" class="menu-btn jihi">
      <h3>自費施術</h3>
      <p>慢性的なお悩みに対応</p>
    </a>

    <a href="https://yuzu2021.github.io/lp-seikotsu-jiko2/" class="menu-btn jiko">
      <h3>交通事故治療</h3>
      <p>自己負担0円となる場合があります</p>
    </a>

  </div>

  <p class="note">
  ※症状や状況により施術内容・費用は異なります。<br>
  ※交通事故治療は保険適用条件により自己負担が発生する場合があります。
  </p>

</section>

<footer>
  <p>© にしむら整骨院</p>
</footer>

<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>

</body>
</html>
